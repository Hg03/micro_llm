name: micro_ml

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  indexing-endpoint:
    name: indexing
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install the project
        run: uv sync

      - name: Run indexing script
        # We use 'uv run' to ensure the script uses the environment created by 'uv sync'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          QDRANT_CLUSTER_ENDPOINT: ${{ secrets.QDRANT_CLUSTER_ENDPOINT }}
        run: uv run index

  docker:
    name: build and push docker image
    runs-on: ubuntu-latest
    needs: indexing-endpoint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push indexing image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.indexing
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/micro-llm-indexing:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/micro-llm-indexing:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push inference image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.inference
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/micro-llm-inference:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/micro-llm-inference:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max